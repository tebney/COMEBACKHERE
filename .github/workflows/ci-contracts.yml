name: CI - Contracts

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: COMEBACKHERE-contracts

    steps:
      - uses: actions/checkout@v4
        with:
          repository: WHEELBACK/COMEBACKHERE-contracts
          ref: main
          path: COMEBACKHERE-contracts

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            COMEBACKHERE-contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('COMEBACKHERE-contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - run: cargo test --workspace
